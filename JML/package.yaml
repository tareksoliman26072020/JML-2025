name:                JML
version:             0.1.0.0
github:              "githubuser/JML"
license:             BSD-3-Clause
author:              "Author name here"
maintainer:          "example@example.com"
copyright:           "2025 Author name here"

extra-source-files:
- README.md
- CHANGELOG.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/githubuser/JML#readme>

dependencies:
- base >= 4.7 && < 5
- parsec
- ordered-containers
- containers
- mtl
- directory

ghc-options:
- -Wall
- -Widentities
- -Wincomplete-record-updates
- -Wno-incomplete-uni-patterns
- -Wno-missing-home-modules
- -Wredundant-constraints
- -Wno-unused-imports
- -Wno-overlapping-patterns
- -Wname-shadowing
- -Wno-unused-do-bind
- -Wno-name-shadowing
- -Wno-unused-matches
- -Wno-unused-local-binds
- -Wno-incomplete-patterns
- -Wno-missing-signatures
- -Wno-orphans

library:
  source-dirs:
    - src

executables:
  JML-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - JML

tests:
  JML-test:
    main:                Main.hs
    source-dirs:         test
    ghc-options:
    - -rtsopts
    - -with-rtsopts=-N
    - -threaded
    dependencies:
    - JML
    - tasty
    - tasty-hunit
  SymbolicExecution-test:
    main:                Main.hs
    source-dirs:         test
    ghc-options:
    - -rtsopts
    - -with-rtsopts=-N
    - -threaded
    dependencies:
    - JML
    - tasty
    - tasty-hunit
